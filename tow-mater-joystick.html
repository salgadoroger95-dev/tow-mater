<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tow Mater Control</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

  body {
    background: #0d0d0d;
    color: #f0f0f0;
    font-family: 'Courier New', monospace;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 24px 16px;
    overflow: hidden;
  }

  header { text-align: center; }

  .title {
    font-size: 1.1rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #f0c040;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: #888;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #444;
    transition: background 0.3s;
  }
  .dot.connected   { background: #40f080; }
  .dot.connecting  { background: #f0c040; animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .telemetry {
    display: flex;
    gap: 24px;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    color: #666;
  }
  .telemetry span { color: #f0c040; }

  .joystick-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    flex: 1;
    justify-content: center;
  }

  .joystick-base {
    width: 240px; height: 240px;
    border-radius: 50%;
    border: 2px solid #2a2a2a;
    background: radial-gradient(circle at center, #1a1a1a 0%, #111 100%);
    position: relative;
  }

  .joystick-base::before, .joystick-base::after {
    content: ''; position: absolute; background: #222;
  }
  .joystick-base::before { width:1px; height:100%; left:50%; top:0; }
  .joystick-base::after  { height:1px; width:100%; top:50%; left:0; }

  .joystick-thumb {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f0c040, #b08000);
    border: 2px solid #f0d060;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 4px 20px rgba(240,192,64,0.3);
    pointer-events: none;
  }

  .direction-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: #444;
    text-transform: uppercase;
    position: absolute;
  }
  .label-fwd { top:8px;    left:50%; transform:translateX(-50%); }
  .label-rev { bottom:8px; left:50%; transform:translateX(-50%); }

  .speed-display { width: 240px; text-align: center; }

  .speed-bar-track {
    height: 6px;
    background: #1a1a1a;
    border-radius: 3px;
    position: relative;
    overflow: hidden;
    border: 1px solid #2a2a2a;
  }

  .speed-bar-fill {
    height: 100%; width: 0%;
    background: #f0c040;
    border-radius: 3px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    transition: width 0.05s, background 0.1s;
  }

  .speed-value {
    margin-top: 6px;
    font-size: 0.7rem;
    color: #666;
    letter-spacing: 0.1em;
  }
  .speed-value span { color: #f0c040; }

  .connect-btn {
    background: transparent;
    border: 1px solid #f0c040;
    color: #f0c040;
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 12px 32px;
    border-radius: 2px;
    cursor: pointer;
  }
  .connect-btn:active   { background: #f0c040; color: #0d0d0d; }
  .connect-btn:disabled { border-color: #333; color: #333; cursor: default; }

  .emergency-stop {
    background: #2a0000;
    border: 1px solid #800000;
    color: #ff4040;
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: 2px;
    cursor: pointer;
  }
  .emergency-stop:active { background: #800000; }

  .bottom-row { display: flex; gap: 12px; align-items: center; }
</style>
</head>
<body>

<header>
  <div class="title">⚡ Tow Mater</div>
  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="status-text">Disconnected</span>
  </div>
  <div class="telemetry">
    DIR: <span id="tel-dir">NEUTRAL</span> &nbsp;|&nbsp;
    SPD: <span id="tel-spd">0</span>%
  </div>
</header>

<div class="joystick-area">
  <div class="joystick-base" id="joystick-base">
    <div class="direction-label label-fwd">FWD</div>
    <div class="direction-label label-rev">REV</div>
    <div class="joystick-thumb" id="thumb"></div>
  </div>

  <div class="speed-display">
    <div class="speed-bar-track">
      <div class="speed-bar-fill" id="speed-bar"></div>
    </div>
    <div class="speed-value">SPEED <span id="spd-label">0</span>%</div>
  </div>
</div>

<div class="bottom-row">
  <button class="connect-btn" id="connect-btn" onclick="connectBLE()">Connect</button>
  <button class="emergency-stop" onclick="emergencyStop()">■ STOP</button>
</div>

<script>
  const SERVICE_UUID        = '12345678-1234-1234-1234-123456789abc';
  const CHARACTERISTIC_UUID = '12345678-1234-1234-1234-123456789abd';

  let bleDevice = null, bleChar = null, connected = false;
  let currentSpeed = 0;

  async function connectBLE() {
    try {
      setStatus('connecting');
      bleDevice = await navigator.bluetooth.requestDevice({
        filters: [{ name: 'TowMater' }],
        optionalServices: [SERVICE_UUID]
      });
      bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
      const server  = await bleDevice.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      bleChar        = await service.getCharacteristic(CHARACTERISTIC_UUID);
      connected = true;
      setStatus('connected');
      setInterval(sendSpeed, 50);
    } catch(e) {
      setStatus('disconnected');
    }
  }

  function onDisconnected() {
    connected = false;
    bleChar = null;
    setStatus('disconnected');
  }

  function disconnectBLE() {
    emergencyStop();
    setTimeout(() => {
      if (bleDevice && bleDevice.gatt.connected) {
        bleDevice.gatt.disconnect();
      }
      bleChar = null;
      connected = false;
      setStatus('disconnected');
    }, 200);
  }

  function sendSpeed() {
    if (!connected || !bleChar) return;
    const data = new Uint8Array([currentSpeed + 100]);
    bleChar.writeValueWithoutResponse(data).catch(()=>{});
  }

  function emergencyStop() {
    currentSpeed = 0;
    updateUI(0);
  }

  const base  = document.getElementById('joystick-base');
  const thumb = document.getElementById('thumb');
  const RADIUS = 84;
  let dragging = false;

  function handleMove(clientX, clientY) {
    const r  = base.getBoundingClientRect();
    const cy = r.top + r.height / 2;
    let dy = Math.max(-RADIUS, Math.min(RADIUS, clientY - cy));
    thumb.style.transform = `translate(-50%, calc(-50% + ${dy}px))`;
    currentSpeed = Math.round((-dy / RADIUS) * 100);
    updateUI(currentSpeed);
  }

  function handleEnd() {
    dragging = false;
    thumb.style.transform = 'translate(-50%, -50%)';
    currentSpeed = 0;
    updateUI(0);
  }

  base.addEventListener('touchstart', e => { e.preventDefault(); dragging = true;  handleMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  base.addEventListener('touchmove',  e => { e.preventDefault(); if (dragging) handleMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  base.addEventListener('touchend',   e => { e.preventDefault(); handleEnd(); }, { passive: false });
  base.addEventListener('mousedown',  e => { dragging = true;  handleMove(e.clientX, e.clientY); });
  window.addEventListener('mousemove', e => { if (dragging) handleMove(e.clientX, e.clientY); });
  window.addEventListener('mouseup',   () => { if (dragging) handleEnd(); });

  function updateUI(spd) {
    const pct = Math.abs(spd);
    document.getElementById('speed-bar').style.width      = pct + '%';
    document.getElementById('speed-bar').style.background = spd > 0 ? '#40f080' : spd < 0 ? '#f04040' : '#f0c040';
    document.getElementById('spd-label').textContent      = pct;
    document.getElementById('tel-spd').textContent        = pct;
    document.getElementById('tel-dir').textContent        = spd > 0 ? 'FWD' : spd < 0 ? 'REV' : 'NEUTRAL';
  }

  function setStatus(state) {
    const dot = document.getElementById('dot');
    const txt = document.getElementById('status-text');
    const btn = document.getElementById('connect-btn');
    dot.className = 'dot ' + state;
    if (state === 'connected')    { txt.textContent = 'Connected';     btn.textContent = 'Disconnect'; btn.onclick = disconnectBLE;  btn.disabled = false; }
    if (state === 'connecting')   { txt.textContent = 'Connecting...'; btn.disabled = true; }
    if (state === 'disconnected') { txt.textContent = 'Disconnected';  btn.textContent = 'Connect';    btn.onclick = connectBLE;     btn.disabled = false; }
  }
</script>
</body>
</html>
