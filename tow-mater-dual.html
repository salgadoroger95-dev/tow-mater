<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tow Mater</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; touch-action:none; -webkit-tap-highlight-color:transparent; }

  body {
    background: #0d0d0d;
    color: #f0f0f0;
    font-family: 'Courier New', monospace;
    width: 100dvw;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px;
    border-bottom: 1px solid #1a1a1a;
    flex-shrink: 0;
  }

  .title {
    font-size: 0.9rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #f0c040;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: #666;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #333;
    transition: background 0.3s;
  }
  .dot.connected   { background: #40f080; }
  .dot.connecting  { background: #f0c040; animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .connect-btn {
    background: transparent;
    border: 1px solid #f0c040;
    color: #f0c040;
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 2px;
    cursor: pointer;
  }
  .connect-btn:active { background: #f0c040; color: #0d0d0d; }
  .connect-btn:disabled { border-color: #333; color: #333; }

  /* ── Main area ── */
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    gap: 12px;
  }

  /* ── Joystick ── */
  .joystick-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .joystick-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: #444;
    text-transform: uppercase;
  }

  .joystick-base {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 2px solid #222;
    background: radial-gradient(circle at center, #1a1a1a 0%, #111 100%);
    position: relative;
    cursor: grab;
  }

  .joystick-base::before, .joystick-base::after {
    content: ''; position: absolute; background: #1e1e1e;
  }
  .joystick-base::before { width:1px; height:100%; left:50%; top:0; }
  .joystick-base::after  { height:1px; width:100%; top:50%; left:0; }

  .thumb {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f0c040, #a07000);
    border: 2px solid #f0d060;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 3px 16px rgba(240,192,64,0.25);
    pointer-events: none;
  }

  .dir-label {
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    color: #333;
    text-transform: uppercase;
    position: absolute;
  }
  .lbl-f { top:6px;    left:50%; transform:translateX(-50%); }
  .lbl-r { bottom:6px; left:50%; transform:translateX(-50%); }

  /* Speed bar under each joystick */
  .bar-track {
    width: 180px; height: 5px;
    background: #1a1a1a;
    border-radius: 3px;
    border: 1px solid #222;
    position: relative;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%; width: 0%;
    background: #f0c040;
    border-radius: 3px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    transition: width 0.04s, background 0.1s;
  }
  .bar-val {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: #555;
    text-align: center;
  }
  .bar-val span { color: #f0c040; }

  /* ── Center panel ── */
  .center-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    min-width: 120px;
  }

  .telemetry {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: #555;
    text-align: center;
  }
  .telemetry span { color: #f0c040; }

  .estop {
    background: #1a0000;
    border: 1px solid #600000;
    color: #ff3030;
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 12px 16px;
    border-radius: 2px;
    cursor: pointer;
    width: 100%;
  }
  .estop:active { background: #600000; }

  .mode-indicator {
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    color: #333;
    text-align: center;
  }
  .mode-indicator.active { color: #40f080; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="title">⚡ TOW MATER</div>
  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="status-text">Disconnected</span>
  </div>
  <button class="connect-btn" id="connect-btn" onclick="connectBLE()">Connect</button>
</div>

<!-- Main -->
<div class="main">

  <!-- Left joystick -->
  <div class="joystick-col">
    <div class="joystick-label">Left Motor</div>
    <div class="joystick-base" id="joy-left">
      <div class="dir-label lbl-f">FWD</div>
      <div class="dir-label lbl-r">REV</div>
      <div class="thumb" id="thumb-left"></div>
    </div>
    <div class="bar-track"><div class="bar-fill" id="bar-left"></div></div>
    <div class="bar-val" id="val-left">SPD <span>0</span>%</div>
  </div>

  <!-- Center panel -->
  <div class="center-panel">
    <div class="telemetry">
      <div>L: <span id="tel-l">NEUTRAL</span></div>
      <div>R: <span id="tel-r">NEUTRAL</span></div>
    </div>
    <button class="estop" onclick="emergencyStop()">■ STOP</button>
    <div class="mode-indicator" id="mode-ind">INDEPENDENT</div>
  </div>

  <!-- Right joystick -->
  <div class="joystick-col">
    <div class="joystick-label">Right Motor</div>
    <div class="joystick-base" id="joy-right">
      <div class="dir-label lbl-f">FWD</div>
      <div class="dir-label lbl-r">REV</div>
      <div class="thumb" id="thumb-right"></div>
    </div>
    <div class="bar-track"><div class="bar-fill" id="bar-right"></div></div>
    <div class="bar-val" id="val-right">SPD <span>0</span>%</div>
  </div>

</div>

<script>
  const SERVICE_UUID  = '12345678-1234-1234-1234-123456789abc';
  const CHAR_UUID     = '12345678-1234-1234-1234-123456789abd';

  let bleChar = null, connected = false, bleDevice = null;
  let speedL = 0, speedR = 0;
  const RADIUS = 65;

  // ── BLE ──────────────────────────────────────────────
  async function connectBLE() {
    try {
      setStatus('connecting');
      bleDevice = await navigator.bluetooth.requestDevice({
        filters: [{ name: 'TowMater' }],
        optionalServices: [SERVICE_UUID]
      });
      bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
      const server  = await bleDevice.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      bleChar        = await service.getCharacteristic(CHAR_UUID);
      connected = true;
      setStatus('connected');
      setInterval(sendSpeeds, 50);
    } catch(e) { setStatus('disconnected'); }
  }

  function onDisconnected() {
    connected = false; setStatus('disconnected');
  }

  function sendSpeeds() {
    if (!connected || !bleChar) return;
    // Pack both motors into 2 bytes: [left+100, right+100]
    const data = new Uint8Array([speedL + 100, speedR + 100]);
    bleChar.writeValueWithoutResponse(data).catch(()=>{});
  }

  function emergencyStop() {
    speedL = 0; speedR = 0;
    updateUI('left', 0); updateUI('right', 0);
    sendSpeeds();
  }

  // ── Joystick ─────────────────────────────────────────
  function makeJoystick(baseId, thumbId, side) {
    const base  = document.getElementById(baseId);
    const thumb = document.getElementById(thumbId);
    let active = false;

    function move(clientX, clientY) {
      const r = base.getBoundingClientRect();
      const cx = r.left + r.width/2;
      const cy = r.top  + r.height/2;
      let dy = Math.max(-RADIUS, Math.min(RADIUS, clientY - cy));
      thumb.style.transform = `translate(-50%, calc(-50% + ${dy}px))`;
      const spd = Math.round((-dy / RADIUS) * 100);
      if (side === 'left') speedL = spd; else speedR = spd;
      updateUI(side, spd);
    }

    function release() {
      active = false;
      thumb.style.transform = 'translate(-50%, -50%)';
      if (side === 'left') speedL = 0; else speedR = 0;
      updateUI(side, 0);
    }

    base.addEventListener('touchstart', e => { e.preventDefault(); active = true; move(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    base.addEventListener('touchmove',  e => { e.preventDefault(); if (active) move(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    base.addEventListener('touchend',   e => { e.preventDefault(); release(); }, { passive: false });
    base.addEventListener('mousedown',  e => { active = true; move(e.clientX, e.clientY); });
    window.addEventListener('mousemove', e => { if (active) move(e.clientX, e.clientY); });
    window.addEventListener('mouseup',   () => { if (active) release(); });
  }

  makeJoystick('joy-left',  'thumb-left',  'left');
  makeJoystick('joy-right', 'thumb-right', 'right');

  // ── UI ───────────────────────────────────────────────
  function updateUI(side, spd) {
    const pct  = Math.abs(spd);
    const bar  = document.getElementById('bar-'  + side);
    const val  = document.getElementById('val-'  + side);
    const tel  = document.getElementById('tel-'  + side.charAt(0));
    bar.style.width      = pct + '%';
    bar.style.background = spd > 0 ? '#40f080' : spd < 0 ? '#f04040' : '#f0c040';
    val.innerHTML        = `SPD <span>${pct}</span>%`;
    tel.textContent      = spd > 0 ? 'FWD ' + pct + '%' : spd < 0 ? 'REV ' + pct + '%' : 'NEUTRAL';
  }

  function setStatus(state) {
    const dot = document.getElementById('dot');
    const txt = document.getElementById('status-text');
    const btn = document.getElementById('connect-btn');
    dot.className = 'dot ' + state;
    if (state === 'connected')   { txt.textContent = 'Connected';    btn.textContent = 'Disconnect'; btn.onclick = () => bleDevice && bleDevice.gatt.disconnect(); btn.disabled = false; }
    if (state === 'connecting')  { txt.textContent = 'Connecting...'; btn.disabled = true; }
    if (state === 'disconnected'){ txt.textContent = 'Disconnected'; btn.textContent = 'Connect'; btn.onclick = connectBLE; btn.disabled = false; }
  }
</script>
</body>
</html>
