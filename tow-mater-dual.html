<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tow Mater Dual</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; touch-action:none; -webkit-tap-highlight-color:transparent; }

  body {
    background: #0d0d0d;
    color: #f0f0f0;
    font-family: 'Courier New', monospace;
    width: 100dvw;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 16px;
    border-bottom: 1px solid #1a1a1a;
    flex-shrink: 0;
    height: 36px;
  }

  .title {
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #f0c040;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: #666;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #333;
    transition: background 0.3s;
  }
  .dot.connected   { background: #40f080; }
  .dot.connecting  { background: #f0c040; animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .connect-btn {
    background: transparent;
    border: 1px solid #f0c040;
    color: #f0c040;
    font-family: 'Courier New', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 2px;
    cursor: pointer;
  }
  .connect-btn:active   { background: #f0c040; color: #0d0d0d; }
  .connect-btn:disabled { border-color: #333; color: #333; }

  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 16px;
    gap: 8px;
    min-height: 0;
  }

  .joystick-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex: 1;
  }

  .joystick-label {
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: #444;
    text-transform: uppercase;
  }

  .joystick-base {
    /* Fill available height in landscape — capped so it stays circular */
    width: min(42vw, calc(100dvh - 120px));
    height: min(42vw, calc(100dvh - 120px));
    border-radius: 50%;
    border: 2px solid #222;
    background: radial-gradient(circle at center, #1a1a1a 0%, #111 100%);
    position: relative;
    cursor: grab;
    flex-shrink: 0;
  }

  .joystick-base::before, .joystick-base::after {
    content: ''; position: absolute; background: #1e1e1e;
  }
  .joystick-base::before { width:1px; height:100%; left:50%; top:0; }
  .joystick-base::after  { height:1px; width:100%; top:50%; left:0; }

  .thumb {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f0c040, #a07000);
    border: 2px solid #f0d060;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 3px 20px rgba(240,192,64,0.3);
    pointer-events: none;
  }

  .dir-label {
    font-size: 0.5rem;
    letter-spacing: 0.12em;
    color: #333;
    text-transform: uppercase;
    position: absolute;
  }
  .lbl-f { top:8px;    left:50%; transform:translateX(-50%); }
  .lbl-r { bottom:8px; left:50%; transform:translateX(-50%); }

  .bar-track {
    width: 90%;
    height: 5px;
    background: #1a1a1a;
    border-radius: 3px;
    border: 1px solid #222;
    position: relative;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%; width: 0%;
    background: #f0c040;
    border-radius: 3px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    transition: width 0.04s, background 0.1s;
  }
  .bar-val {
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    color: #555;
    text-align: center;
  }
  .bar-val span { color: #f0c040; }

  .center-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 100px;
    flex-shrink: 0;
  }

  .telemetry {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    color: #555;
    text-align: center;
  }
  .telemetry span { color: #f0c040; }

  .estop-wrap {
    position: relative;
    width: 100%;
    border-radius: 2px;
    overflow: hidden;
  }

  .estop {
    background: #1a0000;
    border: 1px solid #600000;
    color: #ff3030;
    font-family: 'Courier New', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 10px 12px;
    border-radius: 2px;
    cursor: pointer;
    width: 100%;
    position: relative;
    z-index: 1;
    user-select: none;
    -webkit-user-select: none;
  }

  .estop.latched {
    background: #600000;
    border-color: #ff3030;
    color: #ff6060;
  }

  .estop.rearming {
    color: #ffaa30;
    border-color: #ffaa30;
  }

  .rearm-progress {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    width: 0%;
    background: #ffaa30;
    z-index: 2;
    transition: none;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="title">⚡ TOW MATER</div>
  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="status-text">Disconnected</span>
  </div>
  <button class="connect-btn" id="connect-btn" onclick="connectBLE()">Connect</button>
</div>

<div class="main">

  <div class="joystick-col">
    <div class="joystick-label">Left Motor</div>
    <div class="joystick-base" id="joy-left">
      <div class="dir-label lbl-f">FWD</div>
      <div class="dir-label lbl-r">REV</div>
      <div class="thumb" id="thumb-left"></div>
    </div>
    <div class="bar-track"><div class="bar-fill" id="bar-left"></div></div>
    <div class="bar-val" id="val-left">SPD <span>0</span>%</div>
  </div>

  <div class="center-panel">
    <div class="telemetry">
      <div>L: <span id="tel-l">NEUTRAL</span></div>
      <div>R: <span id="tel-r">NEUTRAL</span></div>
    </div>
    <div class="estop-wrap">
      <button class="estop" id="estop-btn">■ STOP</button>
      <div class="rearm-progress" id="rearm-progress"></div>
    </div>
  </div>

  <div class="joystick-col">
    <div class="joystick-label">Right Motor</div>
    <div class="joystick-base" id="joy-right">
      <div class="dir-label lbl-f">FWD</div>
      <div class="dir-label lbl-r">REV</div>
      <div class="thumb" id="thumb-right"></div>
    </div>
    <div class="bar-track"><div class="bar-fill" id="bar-right"></div></div>
    <div class="bar-val" id="val-right">SPD <span>0</span>%</div>
  </div>

</div>

<script>
  const SERVICE_UUID = '12345678-1234-1234-1234-123456789abc';
  const CHAR_UUID    = '12345678-1234-1234-1234-123456789abd';

  let bleChar = null, connected = false, bleDevice = null;
  let speedL = 0, speedR = 0;

  async function connectBLE() {
    try {
      setStatus('connecting');
      bleDevice = await navigator.bluetooth.requestDevice({
        filters: [{ name: 'TowMater' }],
        optionalServices: [SERVICE_UUID]
      });
      bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
      const server  = await bleDevice.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      bleChar        = await service.getCharacteristic(CHAR_UUID);
      connected = true;
      setStatus('connected');
      setInterval(sendSpeeds, 50);
    } catch(e) { setStatus('disconnected'); }
  }

  function onDisconnected() {
    connected = false;
    bleChar = null;
    setStatus('disconnected');
  }

  function disconnectBLE() {
    emergencyStop();
    setTimeout(() => {
      if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect();
      bleChar = null;
      connected = false;
      setStatus('disconnected');
    }, 200);
  }

  function sendSpeeds() {
    if (!connected || !bleChar) return;
    const data = new Uint8Array([speedL + 100, speedR + 100]);
    bleChar.writeValueWithoutResponse(data).catch(()=>{});
  }

  // ── E-Stop state ─────────────────────────────────────────
  let estopped    = false;
  let joysticksEnabled = true;
  let rearmTimer  = null;
  let rearmStart  = null;
  const REARM_MS  = 2000;

  const estopBtn      = document.getElementById('estop-btn');
  const rearmProgress = document.getElementById('rearm-progress');

  function emergencyStop() {
    estopped = true;
    joysticksEnabled = false;
    speedL = 0; speedR = 0;
    updateUI('left', 0);
    updateUI('right', 0);
    // Send neutral immediately and keep sending via sendSpeeds interval
    estopBtn.textContent = '■ STOPPED — HOLD TO REARM';
    estopBtn.classList.add('latched');
  }

  function startRearm() {
    if (!estopped) return;
    rearmStart = Date.now();
    estopBtn.classList.add('rearming');
    estopBtn.textContent = '▶ HOLD TO REARM...';

    rearmTimer = setInterval(() => {
      const elapsed = Date.now() - rearmStart;
      const pct = Math.min(100, (elapsed / REARM_MS) * 100);
      rearmProgress.style.width = pct + '%';

      if (elapsed >= REARM_MS) {
        clearInterval(rearmTimer);
        rearmTimer = null;
        rearmProgress.style.width = '0%';
        estopped = false;
        joysticksEnabled = true;
        estopBtn.classList.remove('latched', 'rearming');
        estopBtn.textContent = '■ STOP';
      }
    }, 30);
  }

  function cancelRearm() {
    if (rearmTimer) {
      clearInterval(rearmTimer);
      rearmTimer = null;
    }
    rearmProgress.style.width = '0%';
    if (estopped) {
      estopBtn.classList.remove('rearming');
      estopBtn.classList.add('latched');
      estopBtn.textContent = '■ STOPPED — HOLD TO REARM';
    }
  }

  // Tap when not stopped → stop
  estopBtn.addEventListener('mousedown',  () => { if (!estopped) emergencyStop(); else startRearm(); });
  estopBtn.addEventListener('mouseup',    cancelRearm);
  estopBtn.addEventListener('mouseleave', cancelRearm);
  estopBtn.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); if (!estopped) emergencyStop(); else startRearm(); }, { passive: false });
  estopBtn.addEventListener('touchend',   e => { e.preventDefault(); e.stopPropagation(); cancelRearm(); }, { passive: false });

  function makeJoystick(baseId, thumbId, side) {
    const base  = document.getElementById(baseId);
    const thumb = document.getElementById(thumbId);
    let activeTouchId = null;

    function getRadius() {
      return base.getBoundingClientRect().height / 2 - 10;
    }

    function move(clientY) {
      if (!joysticksEnabled) return;
      const r  = base.getBoundingClientRect();
      const cy = r.top + r.height / 2;
      const radius = getRadius();
      let dy = Math.max(-radius, Math.min(radius, clientY - cy));
      thumb.style.transform = `translate(-50%, calc(-50% + ${dy}px))`;
      const spd = Math.round((-dy / radius) * 100);
      if (side === 'left') speedL = spd; else speedR = spd;
      updateUI(side, spd);
    }

    function release() {
      activeTouchId = null;
      thumb.style.transform = 'translate(-50%, -50%)';
      if (side === 'left') speedL = 0; else speedR = 0;
      updateUI(side, 0);
    }

    base.addEventListener('touchstart', e => {
      e.preventDefault();
      if (activeTouchId === null) {
        activeTouchId = e.changedTouches[0].identifier;
        move(e.changedTouches[0].clientY);
      }
    }, { passive: false });

    base.addEventListener('touchmove', e => {
      e.preventDefault();
      for (let t of e.changedTouches) {
        if (t.identifier === activeTouchId) { move(t.clientY); break; }
      }
    }, { passive: false });

    base.addEventListener('touchend', e => {
      e.preventDefault();
      for (let t of e.changedTouches) {
        if (t.identifier === activeTouchId) { release(); break; }
      }
    }, { passive: false });

    base.addEventListener('mousedown',   e => { activeTouchId = 'mouse'; move(e.clientY); });
    window.addEventListener('mousemove', e => { if (activeTouchId === 'mouse') move(e.clientY); });
    window.addEventListener('mouseup',   () => { if (activeTouchId === 'mouse') release(); });
  }

  makeJoystick('joy-left',  'thumb-left',  'left');
  makeJoystick('joy-right', 'thumb-right', 'right');

  function updateUI(side, spd) {
    const pct = Math.abs(spd);
    const sid = side.charAt(0);
    document.getElementById('bar-'  + side).style.width      = pct + '%';
    document.getElementById('bar-'  + side).style.background = spd > 0 ? '#40f080' : spd < 0 ? '#f04040' : '#f0c040';
    document.getElementById('val-'  + side).innerHTML        = `SPD <span>${pct}</span>%`;
    document.getElementById('tel-'  + sid).textContent       = spd > 0 ? 'FWD ' + pct + '%' : spd < 0 ? 'REV ' + pct + '%' : 'NEUTRAL';
  }

  function setStatus(state) {
    const dot = document.getElementById('dot');
    const txt = document.getElementById('status-text');
    const btn = document.getElementById('connect-btn');
    dot.className = 'dot ' + state;
    if (state === 'connected')    { txt.textContent = 'Connected';     btn.textContent = 'Disconnect'; btn.onclick = disconnectBLE; btn.disabled = false; }
    if (state === 'connecting')   { txt.textContent = 'Connecting...'; btn.disabled = true; }
    if (state === 'disconnected') { txt.textContent = 'Disconnected';  btn.textContent = 'Connect';    btn.onclick = connectBLE;    btn.disabled = false; }
  }
</script>
</body>
</html>
